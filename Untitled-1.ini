// App.js
import React, { useEffect, useMemo, useState } from "react";

const TOSS_BLUE = "#3182F6";

const ETF_LIST = [
  { key: "VOO", name: "VOO", priceKRW: 650000 }, // 예시가(원화 환산 가정)
  { key: "SMH", name: "SMH", priceKRW: 320000 },
  { key: "SCHD", name: "SCHD", priceKRW: 110000 },
];

const ADVICE_POOL = [
  "커피빈 전문가 지윤님의 조언: 오늘은 믹스커피가 맛있는 날!",
  "커피빈 전문가 지윤님의 조언: 라떼는 사무실이 국룰이에요.",
  "커피빈 전문가 지윤님의 조언: 오늘은 스틱커피 2개 넣어도 OK!",
  "커피빈 전문가 지윤님의 조언: 달달함은 의지력을 보완해줍니다.",
  "커피빈 전문가 지윤님의 조언: 물 한 잔 먼저, 그다음 커피!",
];

function cn(...args) {
  return args.filter(Boolean).join(" ");
}

function formatKRW(n) {
  return new Intl.NumberFormat("ko-KR").format(n);
}

export default function App() {
  const [selected, setSelected] = useState("VOO");
  const [savedMoney, setSavedMoney] = useState(0);
  const [isModalOpen, setIsModalOpen] = useState(false);
  const [advice, setAdvice] = useState(ADVICE_POOL[0]);

  const etf = useMemo(() => ETF_LIST.find((x) => x.key === selected)!, [selected]);

  const ratio = useMemo(() => {
    if (!etf?.priceKRW) return 0;
    return Math.min(100, (savedMoney / etf.priceKRW) * 100);
  }, [savedMoney, etf]);

  useEffect(() => {
    setAdvice(ADVICE_POOL[Math.floor(Math.random() * ADVICE_POOL.length)]);
  }, []);

  const onClickSave = () => {
    setSavedMoney((v) => v + 5000);
    setAdvice(ADVICE_POOL[Math.floor(Math.random() * ADVICE_POOL.length)]);
    setIsModalOpen(true);
  };

  const closeModal = () => setIsModalOpen(false);

  return (
    <div className="min-h-screen bg-white text-slate-900">
      {/* Top safe-area 느낌 */}
      <div className="mx-auto w-full max-w-md px-5 pb-8 pt-6">
        {/* Header */}
        <div className="mb-5">
          <div className="text-sm font-semibold text-slate-500">커피 대신 ETF</div>
          <div className="mt-1 text-2xl font-extrabold tracking-tight">오늘도 커피값을 모아볼까요?</div>
        </div>

        {/* Segmented Control */}
        <div className="mb-6 rounded-2xl bg-slate-100 p-1">
          <div className="grid grid-cols-3 gap-1">
            {ETF_LIST.map((item) => {
              const active = item.key === selected;
              return (
                <button
                  key={item.key}
                  onClick={() => setSelected(item.key)}
                  className={cn(
                    "rounded-xl px-3 py-2 text-sm font-bold transition",
                    active ? "bg-white shadow-sm" : "text-slate-600 hover:bg-white/60"
                  )}
                  aria-pressed={active}
                >
                  {item.name}
                </button>
              );
            })}
          </div>
        </div>

        {/* Main Card */}
        <div className="rounded-3xl border border-slate-100 bg-white p-5 shadow-[0_10px_30px_-18px_rgba(15,23,42,0.35)]">
          {/* Summary */}
          <div className="flex items-start justify-between gap-4">
            <div>
              <div className="text-sm font-semibold text-slate-500">누적 절약</div>
              <div className="mt-1 text-3xl font-extrabold tracking-tight">
                {formatKRW(savedMoney)}원
              </div>
              <div className="mt-2 text-sm text-slate-600">
                선택 ETF: <span className="font-semibold">{etf.name}</span> · 목표가(예시){" "}
                <span className="font-semibold">{formatKRW(etf.priceKRW)}원</span>
              </div>
            </div>

            <div className="shrink-0 rounded-2xl bg-slate-50 px-3 py-2 text-right">
              <div className="text-xs font-semibold text-slate-500">진행률</div>
              <div className="mt-1 text-lg font-extrabold" style={{ color: TOSS_BLUE }}>
                {ratio.toFixed(1)}%
              </div>
            </div>
          </div>

          {/* Progress */}
          <div className="mt-4">
            <div className="h-3 w-full overflow-hidden rounded-full bg-slate-100">
              <div
                className="h-full rounded-full transition-all"
                style={{ width: `${ratio}%`, backgroundColor: TOSS_BLUE }}
                aria-label="progress"
                aria-valuenow={ratio}
                aria-valuemin={0}
                aria-valuemax={100}
                role="progressbar"
              />
            </div>
            <div className="mt-2 flex items-center justify-between text-xs text-slate-500">
              <span>0%</span>
              <span>100%</span>
            </div>
          </div>

          {/* Big Button */}
          <button
            onClick={onClickSave}
            className="mt-5 w-full rounded-2xl py-4 text-lg font-extrabold text-white shadow-sm active:scale-[0.99] transition"
            style={{ backgroundColor: TOSS_BLUE }}
          >
            오늘 커피 참기 성공
          </button>

          <div className="mt-3 text-center text-xs text-slate-500">
            버튼을 누를 때마다 <span className="font-semibold">5,000원</span>씩 쌓여요.
          </div>
        </div>

        {/* Bottom Advice */}
        <div className="mt-6 rounded-2xl bg-slate-50 px-4 py-3 text-sm text-slate-700">
          <span className="font-semibold">커피빈 전문가 지윤님의 조언:</span>{" "}
          <span>{advice.replace("커피빈 전문가 지윤님의 조언:", "").trim()}</span>
        </div>

        {/* Footer spacing */}
        <div className="h-10" />
      </div>

      {/* Modal */}
      {isModalOpen && (
        <div
          className="fixed inset-0 z-50 flex items-end justify-center bg-black/40 p-4 sm:items-center"
          onMouseDown={(e) => {
            if (e.target === e.currentTarget) closeModal();
          }}
          role="dialog"
          aria-modal="true"
        >
          <div className="w-full max-w-md rounded-3xl bg-white p-5 shadow-xl">
            <div className="flex items-start justify-between gap-3">
              <div>
                <div className="text-lg font-extrabold">축하해요!</div>
                <div className="mt-1 text-sm text-slate-700 leading-relaxed">
                  오늘 커피 참기 성공! 대신 사무실에서 커피빈 스틱커피를 마셔 BOA요 ☕️
                </div>
              </div>
              <button
                onClick={closeModal}
                className="rounded-xl px-3 py-2 text-sm font-bold text-slate-500 hover:bg-slate-100"
                aria-label="닫기"
              >
                닫기
              </button>
            </div>

            <div className="mt-4 grid gap-2">
              <a
                href="https://toss.im"
                target="_blank"
                rel="noreferrer"
                className="w-full rounded-2xl py-3 text-center text-sm font-extrabold text-white transition active:scale-[0.99]"
                style={{ backgroundColor: TOSS_BLUE }}
              >
                커피빈 스틱커피 사러가기
              </a>
              <button
                onClick={closeModal}
                className="w-full rounded-2xl py-3 text-sm font-extrabold text-slate-700 hover:bg-slate-50"
              >
                계속 모으기
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}